worktree-path = "~/projects/worktrees/{{ repo }}/{{ branch }}"

[commit.generation]
command = "opencode run -m anthropic/claude-haiku-4.5 --variant fast"

[pre-start]
env = "if [ ! -e .env ] && [ -e {{ primary_worktree_path }}/.env ]; then ln -s {{ primary_worktree_path }}/.env .env; fi"

[aliases]
ws = "wt switch {{ args }}"
wsc = "wt switch --create {{ args }}"
