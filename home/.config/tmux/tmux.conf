if-shell '[ "$(uname -s)" = "Darwin" ]' {
    set-environment -g PATH "/opt/homebrew/bin:/bin:/usr/bin"
}
# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Set prefix
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# Options for general usability
set -sg escape-time 50
set -g default-terminal "screen-256color"
set-option -a terminal-features 'xterm-256color:RGB'
set-option -g status-interval 5
set-option -g history-limit 50000
set-option -g renumber-windows on
set-option -g history-limit 50000
set-option -g detach-on-destroy off
set-option -g focus-events on
set -g mouse on
set -g popup-style "bg=#0e0e1e"
set -g popup-border-style "fg=#9399b2"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection -x

bind-key R run-shell " \
			tmux source-file $HOME/.config/tmux/tmux.conf > /dev/null; \
			tmux display-message 'Sourced $HOME/.config/tmux/tmux.conf!'"

# Window management
bind-key a last-window
bind-key C-z switch-client -l
# Cycling through windows
bind -r P select-window -t -1
bind -r N select-window -t +1
# Moving windows
bind -r H swap-window -t -1\; select-window -t -1
bind -r L swap-window -t +1\; select-window -t +1
# Pane navigation
bind | split-window -h
bind - split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key , command-prompt -I "#{b:pane_current_path}" "rename-window '%%'"
bind K kill-window
bind d run-shell "~/.config/tmux/plugins/tmux-resurrect/scripts/save.sh" \; detach
set -g status-left-length 150
set -g status-right-length 180

# Override ? to show user-defined bindings
bind ? popup -E -x C -y C -w 80% -h 70% -b rounded -T "Keys" 'zsh -c "source ~/.fzf.zsh && ~/.config/tmux/tmux_keys.sh"'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @tmux-dotbar-right true
set -g @tmux-dotbar-ssh-icon-only true
set -g @tmux-dotbar-position top
set -g @tmux-dotbar-bg "#0e0e1e"
set -g @tmux-dotbar-fg "#cdd6f4"
set -g @tmux-dotbar-fg-current "#94e2d5"
set -g @tmux-dotbar-fg-session "#9399b2"
set -g @tmux-dotbar-fg-prefix "#cba6f7"
set -g @tmux-dotbar-window-status-format "#W#($HOME/.config/tmux/tmux_superscript.sh #{window_index})"
set -g @tmux-dotbar-status-right " #(hostname -s) %H:%M "
set -g window-status-last-style "bg=#0e0e1e,fg=#b4befe"

# Session management
bind M-k confirm-before kill-session
bind C-n command-prompt "rename-session '%%'"
bind C-j popup -E -x C -y C -w 60% -h 40% -b rounded -T "Sessions" 'zsh -c "source ~/.fzf.zsh && ~/.config/tmux/tmux_sessions.sh"'
bind C-w popup -E -x C -y C -w 70% -h 55% -b rounded -T "Windows" 'zsh -c "source ~/.fzf.zsh && ~/.config/tmux/tmux_windows.sh"'
bind C-c new -s "#{b:pane_current_path}" -c "#{pane_current_path}"

bind M-K run-shell "~/.config/tmux/plugins/tmux-resurrect/scripts/save.sh" \; kill-server

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
